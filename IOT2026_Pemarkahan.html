<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IOT 2026 · Sistem Pemarkahan</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eef2f7;min-height:100vh;font-size:15px;color:#1a202c}
.app{max-width:500px;margin:0 auto;min-height:100vh;background:#fff}
.login-wrap{padding:2.5rem 1.5rem;display:flex;flex-direction:column;gap:1.25rem;min-height:100vh;justify-content:center}
.logo-icon{font-size:48px;text-align:center;margin-bottom:4px}
.logo-title{font-size:20px;font-weight:700;color:#1a365d;text-align:center;line-height:1.3}
.logo-sub{font-size:12px;color:#718096;text-align:center;margin-top:4px}
.form-lbl{font-size:11px;font-weight:700;color:#4a5568;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:5px;display:block}
.form-inp{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:16px;outline:none;background:#fff;transition:border-color 0.2s;color:#1a202c}
.form-inp:focus{border-color:#3182ce;box-shadow:0 0 0 3px rgba(49,130,206,0.1)}
.btn-login{background:#1a365d;color:#fff;border:none;padding:14px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;width:100%}
.btn-login:disabled{background:#a0aec0}
.err-box{background:#fff5f5;border:1.5px solid #fed7d7;color:#c53030;padding:10px 14px;border-radius:8px;font-size:13px}
.hint-box{background:#ebf8ff;border:1.5px solid #bee3f8;color:#2b6cb0;padding:10px 14px;border-radius:8px;font-size:12px;line-height:1.8}
.hdr{background:#1a365d;color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.hdr-title{font-size:15px;font-weight:700;line-height:1.3}
.hdr-sub{font-size:11px;opacity:0.7;margin-top:2px}
.btn-out{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:7px 13px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer}
.page{padding:16px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:#f7fafc;border-radius:10px;padding:14px;text-align:center;border:1px solid #e2e8f0}
.stat-n{font-size:26px;font-weight:700;color:#1a365d}
.stat-l{font-size:11px;color:#718096;margin-top:3px}
.grp-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;margin-bottom:10px;overflow:hidden}
.grp-row{padding:13px 15px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:#f8fafc;user-select:none}
.grp-row:active{background:#edf2f7}
.grp-name{font-size:15px;font-weight:700;color:#2d3748}
.grp-meta{font-size:12px;color:#718096;margin-top:2px}
.badge{font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.badge-done{background:#f0fff4;color:#276749;border:1px solid #9ae6b4}
.badge-pend{background:#fffaf0;color:#c05621;border:1px solid #fbd38d}
.score-page{display:none;flex-direction:column;min-height:100vh;background:#fff}
.score-page.active{display:flex}
.score-hdr{background:#1a365d;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.btn-back{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:7px 13px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.score-hdr-info{flex:1}
.score-hdr-title{font-size:15px;font-weight:700}
.score-hdr-sub{font-size:11px;opacity:0.7;margin-top:2px}
.score-body{padding:16px;flex:1;overflow-y:auto}
.comp-hdr{font-size:11px;font-weight:700;color:#2b6cb0;text-transform:uppercase;letter-spacing:0.5px;padding:7px 11px;background:#ebf8ff;border-radius:7px;margin-bottom:8px;margin-top:12px}
.comp-hdr:first-child{margin-top:0}
.crit-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid #f0f4f8;gap:10px}
.crit-lbl{flex:1;font-size:13px;color:#2d3748;line-height:1.4;min-width:0}
.score-sel{display:flex;gap:3px;flex-shrink:0}
.sb{min-width:28px;height:32px;border-radius:7px;border:1.5px solid #e2e8f0;background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:#718096;padding:0 5px;transition:all 0.1s}
.sb.sel{background:#1a365d;border-color:#1a365d;color:#fff}
.sb:active{transform:scale(0.92)}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0 8px;margin-top:8px;border-top:2px solid #e2e8f0}
.total-lbl{font-size:14px;font-weight:700;color:#2d3748}
.total-val{font-size:28px;font-weight:700;color:#1a365d}
.btn-save{background:#276749;color:#fff;border:none;padding:14px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin-top:10px;margin-bottom:20px}
.btn-save:disabled{background:#a0aec0;cursor:not-allowed}
.cat-tabs{display:flex;gap:8px;margin-bottom:16px}
.cat-tab{flex:1;padding:9px;border:1.5px solid #e2e8f0;border-radius:9px;background:#fff;font-size:13px;font-weight:600;color:#718096;cursor:pointer;text-align:center}
.cat-tab.act{background:#1a365d;border-color:#1a365d;color:#fff}
.adm-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;margin-bottom:10px;padding:14px}
.avg-big{font-size:26px;font-weight:700;color:#1a365d;line-height:1}
.avg-lbl{font-size:11px;color:#718096;margin-top:3px}
.pills{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.pill{font-size:12px;border-radius:20px;padding:4px 11px;font-weight:600}
.pill-done{background:#f0fff4;border:1px solid #9ae6b4;color:#276749}
.pill-pend{background:#fffaf0;border:1px solid #fbd38d;color:#c05621}
.refresh-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:8px 12px;background:#f7fafc;border-radius:8px;border:1px solid #e2e8f0}
.refresh-txt{font-size:12px;color:#718096}
.btn-refresh{background:#1a365d;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.rank-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.rank-table th{background:#f7fafc;padding:8px 10px;text-align:left;font-size:11px;font-weight:700;color:#718096;text-transform:uppercase;border-bottom:1px solid #e2e8f0}
.rank-table td{padding:9px 10px;border-bottom:1px solid #f0f4f8;color:#2d3748}
.rank-table tr:last-child td{border-bottom:none}
.rank-1 td{font-weight:700;color:#276749}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.toast.show{opacity:1}
.toast.ok{background:#276749}
.toast.err{background:#c53030}
</style>
</head>
<body>
<div class="app" id="appMain"></div>
<div class="app score-page" id="scorePage">
  <div class="score-hdr">
    <button class="btn-back" id="btnBack">← Balik</button>
    <div class="score-hdr-info">
      <div class="score-hdr-title" id="scoreTitle">-</div>
      <div class="score-hdr-sub">Borang Pemarkahan · IOT 2026</div>
    </div>
    <div id="scoreLiveTotal" style="font-size:18px;font-weight:700;white-space:nowrap">0/100</div>
  </div>
  <div class="score-body" id="scoreBody"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const FB='https://iot2026-2dee4-default-rtdb.firebaseio.com';
const USERS={hakim1:{pw:'hakim123',name:'Hakim 1',role:'judge',cat:'rendah'},hakim2:{pw:'hakim234',name:'Hakim 2',role:'judge',cat:'rendah'},hakim3:{pw:'hakim345',name:'Hakim 3',role:'judge',cat:'rendah'},hakim4:{pw:'hakim456',name:'Hakim 4',role:'judge',cat:'menengah'},hakim5:{pw:'hakim567',name:'Hakim 5',role:'judge',cat:'menengah'},hakim6:{pw:'hakim678',name:'Hakim 6',role:'judge',cat:'menengah'},ketua:{pw:'ketua2026',name:'Ketua Juri',role:'admin'},pegawai:{pw:'pegawai2026',name:'Pegawai Teknikal',role:'admin'}};
const JR=['hakim1','hakim2','hakim3'],JM=['hakim4','hakim5','hakim6'];
const JS={hakim1:'H1',hakim2:'H2',hakim3:'H3',hakim4:'H4',hakim5:'H5',hakim6:'H6'};
const GROUPS={rendah:Array.from({length:15},(_,i)=>({id:`ISR${String(i+1).padStart(3,'0')}`})),menengah:Array.from({length:15},(_,i)=>({id:`ISM${String(i+1).padStart(3,'0')}`}))};
const CR={pameran:[{id:'stem',label:'Aplikasi pengetahuan STEM',max:10},{id:'poster',label:'Persembahan poster / infografik',max:5},{id:'keaslian',label:'Keaslian',max:5},{id:'kreativiti',label:'Kreativiti',max:5}],pembentangan:[{id:'penyampaian',label:'Kemahiran penyampaian',max:10},{id:'saintifik',label:'Kemahiran saintifik',max:5},{id:'interaksi',label:'Kemahiran interaksi & menjawab soalan',max:5},{id:'personaliti',label:'Personaliti keseluruhan',max:5}],laporan:[{id:'abstrak',label:'Abstrak',max:5},{id:'pengenalan',label:'Pengenalan & Sorotan Kajian (Literature Review)',max:5},{id:'metodologi',label:'Metodologi',max:5},{id:'hasil',label:'Hasil Kajian',max:5},{id:'perbincangan',label:'Perbincangan & Kesimpulan',max:5},{id:'rujukan',label:'Rujukan / Apendiks',max:5}],signifikan:[{id:'pemikiran',label:'Pemikiran saintifik / matlamat kejuruteraan',max:5},{id:'sumbangan',label:'Sumbangan / impak kepada pembangunan masyarakat',max:5},{id:'kesan',label:'Kesan kepada kualiti alam sekitar & masyarakat',max:5}],keistimewaan:[{id:'kolaborasi',label:'Kolaborasi',max:3,sp:'s3'},{id:'patent',label:'Patent / Daftar myIPO',max:2,sp:'s2'}]};
const CL={pameran:'Pameran Projek / Prototaip (25%)',pembentangan:'Pembentangan (25%)',laporan:'Penulisan Laporan (30%)',signifikan:'Projek Signifikan (15%)',keistimewaan:'Keistimewaan Produk (5%)'};
async function dbGet(){try{const r=await fetch(`${FB}/scores.json`);if(!r.ok)throw new Error();return await r.json()||{};}catch(e){const l=localStorage.getItem('iot2026');return l?JSON.parse(l):{};}}
async function dbSet(d){try{const r=await fetch(`${FB}/scores.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});if(!r.ok)throw new Error();localStorage.setItem('iot2026',JSON.stringify(d));return true;}catch(e){localStorage.setItem('iot2026',JSON.stringify(d));return false;}}
let S={user:null,adminCat:'rendah',scores:{},loginUser:'',loginErr:'',loading:false,lastSync:null,currentGroup:null};
function getScore(j,g,c){return S.scores[j]?.[g]?.[c]??null}
function setScore(j,g,c,v){if(!S.scores[j])S.scores[j]={};if(!S.scores[j][g])S.scores[j][g]={};S.scores[j][g][c]=v;}
function calcTotal(s){let t=0;Object.values(CR).forEach(a=>a.forEach(c=>{const v=s?.[c.id];if(v!=null)t+=v;}));return t}
function isComplete(j,g){const s=S.scores[j]?.[g];if(!s)return false;return Object.values(CR).every(a=>a.every(c=>s[c.id]!=null))}
function getAvg(g,judges){const done=judges.filter(j=>isComplete(j,g));if(!done.length)return null;return(done.reduce((s,j)=>s+calcTotal(S.scores[j]?.[g]||{}),0)/done.length).toFixed(1)}
function liveTotal(){let t=0;Object.values(CR).forEach(a=>a.forEach(c=>{const v=getScore(S.user,S.currentGroup,c.id);if(v!=null)t+=v;}));return t}
function toast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.className=`toast ${type} show`;setTimeout(()=>el.classList.remove('show'),2800);}
function showList(){document.getElementById('scorePage').classList.remove('active');document.getElementById('appMain').style.display='';renderMain();}
function showScore(gid){S.currentGroup=gid;document.getElementById('appMain').style.display='none';document.getElementById('scorePage').classList.add('active');document.getElementById('scoreTitle').textContent=gid;renderScoreBody();document.getElementById('scorePage').scrollTop=0;}
function renderMain(){const app=document.getElementById('appMain');if(!S.user){app.innerHTML=renderLogin();bindLogin();return;}const u=USERS[S.user];app.innerHTML=u.role==='judge'?renderList(u):renderAdmin(u);bindMain();}
function renderLogin(){return `<div class="login-wrap"><div><div class="logo-icon">🏆</div><div class="logo-title">Innovators of Tomorrow<br>Challenge 2026</div><div class="logo-sub">Sistem Pemarkahan IOT Negeri</div></div><div><label class="form-lbl">Nama Pengguna</label><input class="form-inp" id="lu" type="text" placeholder="Contoh: hakim1" autocomplete="username" autocapitalize="none" value="${S.loginUser}"></div><div><label class="form-lbl">Kata Laluan</label><input class="form-inp" id="lp" type="password" placeholder="Masukkan kata laluan" autocomplete="current-password"></div>${S.loginErr?`<div class="err-box">⚠️ ${S.loginErr}</div>`:''}<button class="btn-login" id="btnLogin" ${S.loading?'disabled':''}>${S.loading?'Memuatkan...':'Log Masuk'}</button><div class="hint-box"><strong>Senarai Log Masuk:</strong><br>Hakim Sekolah Rendah: hakim1, hakim2, hakim3<br>Hakim Sekolah Menengah: hakim4, hakim5, hakim6<br>Pentadbir: ketua / pegawai</div></div>`;}
function renderList(u){const groups=GROUPS[u.cat];const done=groups.filter(g=>isComplete(S.user,g.id)).length;let h=`<div class="hdr"><div><div class="hdr-title">${u.name}</div><div class="hdr-sub">Sekolah ${u.cat==='rendah'?'Rendah':'Menengah'} · IOT 2026</div></div><button class="btn-out" id="btnOut">Keluar</button></div><div class="page"><div class="stats-grid"><div class="stat-card"><div class="stat-n">${groups.length}</div><div class="stat-l">Jumlah Kumpulan</div></div><div class="stat-card"><div class="stat-n">${done}</div><div class="stat-l">Selesai Dinilai</div></div></div>`;groups.forEach(g=>{const isDone=isComplete(S.user,g.id);const tot=isDone?calcTotal(S.scores[S.user]?.[g.id]||{}):null;h+=`<div class="grp-card"><div class="grp-row" data-gid="${g.id}"><div><div class="grp-name">${g.id}</div><div class="grp-meta">${isDone?'Sudah dinilai — ketik untuk kemaskini':'Ketik untuk mula menilai'}</div></div><span class="badge ${isDone?'badge-done':'badge-pend'}">${isDone?tot+'/100':'Belum dinilai'}</span></div></div>`;});h+='</div>';return h;}
function renderScoreBody(){const gid=S.currentGroup;let h='';Object.entries(CR).forEach(([comp,crits])=>{h+=`<div class="comp-hdr">${CL[comp]}</div>`;crits.forEach(c=>{const val=getScore(S.user,gid,c.id);h+=`<div class="crit-row"><div class="crit-lbl">${c.label}</div><div class="score-sel" data-crit="${c.id}">`;if(c.sp==='s3'){[1,2,3].forEach(v=>h+=`<button class="sb${val===v?' sel':''}" data-val="${v}">${v}</button>`);}else if(c.sp==='s2'){[0,2].forEach(v=>h+=`<button class="sb${val===v?' sel':''}" data-val="${v}">${v}</button>`);}else{for(let v=1;v<=c.max;v++)h+=`<button class="sb${val===v?' sel':''}" data-val="${v}">${v}</button>`;}h+='</div></div>';});});const tot=liveTotal();h+=`<div class="total-row"><span class="total-lbl">JUMLAH MARKAH</span><span class="total-val" id="liveTotal">${tot}/100</span></div><button class="btn-save" id="btnSave">💾 Simpan Markah</button>`;document.getElementById('scoreBody').innerHTML=h;document.getElementById('scoreLiveTotal').textContent=tot+'/100';bindScoreButtons();}
function bindScoreButtons(){const gid=S.currentGroup;document.querySelectorAll('#scoreBody .score-sel').forEach(sel=>{sel.querySelectorAll('[data-val]').forEach(btn=>{btn.addEventListener('click',()=>{const cid=sel.getAttribute('data-crit');const val=parseInt(btn.getAttribute('data-val'));setScore(S.user,gid,cid,val);sel.querySelectorAll('[data-val]').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');const tot=liveTotal();const el=document.getElementById('liveTotal');if(el)el.textContent=tot+'/100';document.getElementById('scoreLiveTotal').textContent=tot+'/100';});});});document.getElementById('btnSave')?.addEventListener('click',async()=>{if(!isComplete(S.user,gid)){toast('⚠️ Sila lengkapkan semua kriteria terlebih dahulu.','err');return;}const btn=document.getElementById('btnSave');btn.disabled=true;btn.textContent='Menyimpan...';const ok=await dbSet(S.scores);if(ok){toast('✅ Markah berjaya disimpan!','ok');setTimeout(()=>showList(),1200);}else{btn.disabled=false;btn.textContent='💾 Simpan Markah';toast('❌ Gagal simpan. Semak WiFi.','err');}});}
function bindLogin(){const doLogin=async()=>{const u=document.getElementById('lu').value.trim().toLowerCase();const p=document.getElementById('lp').value.trim();S.loginUser=u;if(USERS[u]&&USERS[u].pw===p){S.loading=true;renderMain();S.scores=await dbGet();S.user=u;S.loginErr='';S.loginUser='';S.loading=false;S.lastSync=new Date();renderMain();}else{S.loginErr='Nama pengguna atau kata laluan tidak sah.';renderMain();}};document.getElementById('btnLogin')?.addEventListener('click',doLogin);document.getElementById('lu')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('lp')?.focus();});document.getElementById('lp')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});}
function bindMain(){document.getElementById('btnOut')?.addEventListener('click',()=>{S.user=null;renderMain();});document.querySelectorAll('[data-gid]').forEach(el=>{el.addEventListener('click',()=>showScore(el.getAttribute('data-gid')));});document.querySelectorAll('[data-cat]').forEach(tab=>{tab.addEventListener('click',()=>{S.adminCat=tab.getAttribute('data-cat');renderMain();});});document.getElementById('btnRefresh')?.addEventListener('click',async()=>{const btn=document.getElementById('btnRefresh');btn.textContent='Memuatkan...';S.scores=await dbGet();S.lastSync=new Date();renderMain();toast('✅ Data dikemaskini','ok');});}
document.getElementById('btnBack').addEventListener('click',()=>showList());
renderMain();
</script>
</body>
</html>
